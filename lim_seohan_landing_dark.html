
<div id="landing-root" style="min-height:580px; background:#0a0a0a; border-radius:var(--border-radius-lg); overflow:hidden; position:relative; cursor:none; font-family:'Inter',-apple-system,sans-serif;">

    <h1 style="font-size:clamp(32px,5vw,52px);font-weight:500;line-height:1.15;letter-spacing:-0.025em;color:#fff;margin-bottom:1.5rem;">
      <span id="line1" style="display:block;overflow:hidden;"><span id="line1inner" style="display:block;transform:translateY(100%);transition:transform 0.75s 0.25s cubic-bezier(.16,1,.3,1);">사용자 중심 설계,</span></span>
      <span id="line2" style="display:block;overflow:hidden;"><span id="line2inner" style="display:block;transform:translateY(100%);transition:transform 0.75s 0.4s cubic-bezier(.16,1,.3,1);color:rgba(255,255,255,0.35);">데이터 기반 개선.</span></span>
    </h1>

    <p id="subdesc" style="font-size:13px;color:rgba(255,255,255,0.45);max-width:400px;line-height:1.85;margin-bottom:2.5rem;opacity:0;transform:translateY(14px);transition:opacity 0.7s 0.55s,transform 0.7s 0.55s;">
      복잡한 문제를 직관적인 경험으로 풀어내는 신입 UXUI 디자이너입니다. Figma, 디자인 시스템, UT 기반 개선으로 실제 성과를 만들어온 경험이 있습니다.
    </p>

    <div id="btnrow" style="display:flex;gap:10px;flex-wrap:wrap;opacity:0;transform:translateY(14px);transition:opacity 0.7s 0.7s,transform 0.7s 0.7s;">
      <a href="mailto:seohanlim@gmail.com" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-size:12px;font-family:inherit;border:0.5px solid rgba(255,255,255,0.2);border-radius:6px;background:transparent;color:rgba(255,255,255,0.8);cursor:pointer;text-decoration:none;transition:background 0.2s,border-color 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.07)';this.style.borderColor='rgba(255,255,255,0.4)'" onmouseout="this.style.background='transparent';this.style.borderColor='rgba(255,255,255,0.2)'">
        <i class="ti ti-mail" style="font-size:15px;" aria-hidden="true"></i> seohanlim@gmail.com

        Projects 보기 <i class="ti ti-arrow-right" style="font-size:14px;" aria-hidden="true"></i>

    <div id="statrow" style="display:flex;gap:2.5rem;margin-top:4rem;opacity:0;transform:translateY(14px);transition:opacity 0.7s 0.85s,transform 0.7s 0.85s;">
      <div>
        <p style="font-size:22px;font-weight:500;color:#fff;letter-spacing:-0.02em;">3</p>
        <p style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:3px;letter-spacing:0.06em;">PROJECTS</p>
      </div>
      <div style="width:0.5px;background:rgba(255,255,255,0.1);"></div>
      <div>
        <p style="font-size:22px;font-weight:500;color:#fff;letter-spacing:-0.02em;">95%</p>
        <p style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:3px;letter-spacing:0.06em;">업무 시간 절감</p>
      </div>
      <div style="width:0.5px;background:rgba(255,255,255,0.1);"></div>
      <div>
        <p style="font-size:22px;font-weight:500;color:#fff;letter-spacing:-0.02em;">1.77×</p>
        <p style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:3px;letter-spacing:0.06em;">만족도 향상</p>

  </div>

  <div style="position:absolute;bottom:2rem;right:2.5rem;z-index:10;display:flex;align-items:center;gap:6px;opacity:0.3;" id="scrollhint">
    <span style="font-size:11px;color:#fff;letter-spacing:0.08em;">SCROLL</span>
    <i class="ti ti-arrow-right" style="font-size:13px;color:#fff;" aria-hidden="true"></i>
  </div>
</div>

<script>
(function(){
  const root = document.getElementById('landing-root');
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');

  let mouse = { x: 0, y: 0 };
  let ringPos = { x: 0, y: 0 };
  let W = 0, H = 0;

  function resize() {
    W = canvas.offsetWidth;
    H = canvas.offsetHeight;
    canvas.width = W;
    canvas.height = H;
  }
  resize();

  const particles = Array.from({length: 55}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.2 + 0.3,
    vx: (Math.random() - 0.5) * 0.25,
    vy: (Math.random() - 0.5) * 0.25,
    alpha: Math.random() * 0.4 + 0.1
  }));

  root.addEventListener('mousemove', e => {
    const rect = root.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
    cursor.style.left = mouse.x + 'px';
    cursor.style.top = mouse.y + 'px';
  });

  root.addEventListener('mouseenter', () => {
    cursor.style.opacity = '1';
    ring.style.opacity = '1';
  });
  root.addEventListener('mouseleave', () => {
    cursor.style.opacity = '0';
    ring.style.opacity = '0';
  });

  function lerp(a, b, t) { return a + (b - a) * t; }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    ringPos.x = lerp(ringPos.x, mouse.x, 0.1);
    ringPos.y = lerp(ringPos.y, mouse.y, 0.1);
    ring.style.left = ringPos.x + 'px';
    ring.style.top = ringPos.y + 'px';

    const gx = mouse.x / W;
    const gy = mouse.y / H;

    const grad = ctx.createRadialGradient(
      mouse.x, mouse.y, 0,
      mouse.x, mouse.y, W * 0.55
    );
    grad.addColorStop(0, `rgba(${Math.round(40 + gx*30)},${Math.round(30 + gy*20)},${Math.round(80 + gx*40)},0.18)`);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    particles.forEach(p => {
      p.x += p.vx + (mouse.x / W - 0.5) * 0.08;
      p.y += p.vy + (mouse.y / H - 0.5) * 0.08;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;

      const dx = p.x - mouse.x;
      const dy = p.y - mouse.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const glow = dist < 90 ? (1 - dist/90) * 0.6 : 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r + glow, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${p.alpha + glow * 0.5})`;
      ctx.fill();
    });

    particles.forEach((a, i) => {
      for (let j = i+1; j < particles.length; j++) {
        const b = particles[j];
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 80) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(255,255,255,${0.06 * (1 - d/80)})`;
          ctx.lineWidth = 0.4;
          ctx.stroke();
        }
      }
    });

    requestAnimationFrame(draw);
  }
  draw();

  setTimeout(() => {
    document.getElementById('eyebrow').style.opacity = '1';
    document.getElementById('eyebrow').style.transform = 'translateY(0)';
    document.getElementById('line1inner').style.transform = 'translateY(0)';
    document.getElementById('line2inner').style.transform = 'translateY(0)';
    document.getElementById('subdesc').style.opacity = '1';
    document.getElementById('subdesc').style.transform = 'translateY(0)';
    document.getElementById('btnrow').style.opacity = '1';
    document.getElementById('btnrow').style.transform = 'translateY(0)';
    document.getElementById('statrow').style.opacity = '1';
    document.getElementById('statrow').style.transform = 'translateY(0)';
  }, 100);
})();
</script>
